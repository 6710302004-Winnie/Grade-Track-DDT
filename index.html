<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DDT Grade Calculator - Design System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Sarabun -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    
    <style>
        body {
            font-family: 'Sarabun', 'Inter', sans-serif;
            background-color: #F6F6F6;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
        
        /* Neumorphism Shadow Utilities (ตามสีพื้นหลัง #F6F6F6 ใน Design System) */
        .neo-box {
            background: #F6F6F6;
            box-shadow: 6px 6px 14px #d1d1d1, -6px -6px 14px #ffffff;
        }
        .neo-box-sm {
            background: #F6F6F6;
            box-shadow: 4px 4px 10px #d8d8d8, -4px -4px 10px #ffffff;
        }
        .neo-box-xs {
            background: #F6F6F6;
            box-shadow: 2px 2px 6px #dbdbdb, -2px -2px 6px #ffffff;
        }
        .neo-inset {
            background: #F6F6F6;
            box-shadow: inset 4px 4px 8px #d5d5d5, inset -4px -4px 8px #ffffff;
        }
        .neo-inset-sm {
            background: #F6F6F6;
            box-shadow: inset 2px 2px 5px #d8d8d8, inset -2px -2px 5px #ffffff;
        }
        
        /* ซ่อน Scrollbar */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-[#132045] flex justify-center items-center w-full">

    <!-- ฟิตขนาดเท่าหน้าจอโทรศัพท์จริงแบบพอดีเป๊ะ (Full Mobile Screen Layout) -->
    <div class="w-full h-full max-w-[430px] bg-[#F6F6F6] flex flex-col relative overflow-hidden">
        
        <!-- Header ส่วนบนสุด (คงที่) -->
        <header class="pt-6 pb-3 px-5 text-center border-b border-gray-100 bg-[#F6F6F6] shrink-0">
            <div class="flex items-center justify-between mb-1">
                <span class="text-[10px] font-extrabold text-[#009FDF] uppercase tracking-widest font-inter">DDT Grade Hub</span>
                <span class="text-[10px] bg-[#E2F8FF] text-[#009FDF] py-0.5 px-2 rounded-full font-bold">Design System Pro</span>
            </div>
            <h1 class="text-xl font-black text-[#132045]">ออกแบบดิจิทัลและเทคโนโลยี</h1>
            <p class="text-[10px] text-gray-400 mt-0.5">ระบบประเมินผลการเรียนหลักสูตร 133 หน่วยกิต</p>
        </header>

        <!-- ส่วนเนื้อหา (สกรอลล์อิสระ) -->
        <main id="main-content" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 scrollbar-none pb-24">
            <!-- Content ถูกเรนเดอร์ผ่าน JS -->
        </main>

        <!-- Modal: แก้ไขโปรไฟล์ผู้ใช้ -->
        <div id="profile-modal" class="hidden absolute inset-0 bg-black/30 backdrop-blur-xs flex items-center justify-center p-4 z-50">
            <div class="w-full max-w-[370px] bg-[#F6F6F6] rounded-[30px] shadow-[12px_12px_24px_rgba(0,0,0,0.1),-12px_-12px_24px_rgba(255,255,255,0.9)] p-5 space-y-4 text-left border border-white">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-extrabold text-[#132045]">📝 แก้ไขโปรไฟล์นักศึกษา</h3>
                    <button onclick="toggleProfileModal(false)" class="p-1 rounded-full text-gray-400 hover:text-gray-600 font-bold text-xs">
                        ✖
                    </button>
                </div>

                <form id="profile-form" onsubmit="handleSaveProfile(event)" class="space-y-3 text-xs">
                    <div class="space-y-1">
                        <label class="font-bold text-gray-500">ชื่อ-นามสกุล</label>
                        <input type="text" id="profile-name-input" required placeholder="เช่น ณัฐพล รักษ์ดิจิทัล" class="w-full px-4 py-2.5 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none focus:border-2 focus:border-[#009FDF]">
                    </div>

                    <div class="space-y-1">
                        <label class="font-bold text-gray-500">รหัสนักศึกษา</label>
                        <input type="text" id="profile-id-input" required placeholder="เช่น 66101234" class="w-full px-4 py-2.5 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none focus:border-2 focus:border-[#009FDF] font-inter">
                    </div>

                    <div class="space-y-1">
                        <label class="font-bold text-gray-500 block">รูปโปรไฟล์ (อัปโหลดรูปภาพ)</label>
                        <div class="flex items-center space-x-3 pt-1">
                            <!-- ปุ่มอัปโหลดไฟล์ดีไซน์กลมกลืน -->
                            <button type="button" onclick="document.getElementById('profile-file-input').click()" class="px-4 py-2.5 rounded-[50px] neo-box-sm text-xs text-[#009FDF] font-bold active:scale-95 transition">
                                📷 เลือกไฟล์รูปภาพจากเครื่อง
                            </button>
                            <span id="file-upload-status" class="text-[10px] text-gray-400 font-semibold truncate max-w-[150px]">ไม่ได้เลือกไฟล์</span>
                            <input type="file" id="profile-file-input" accept="image/*" onchange="handleFileSelected(event)" class="hidden">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="font-bold text-gray-500">หรือวางลิงก์รูปถ่าย (URL รูปภาพ)</label>
                        <input type="text" id="profile-photo-input" placeholder="วางลิงก์ URL รูปภาพ หรืออัปโหลดไฟล์ด้านบน" class="w-full px-4 py-2.5 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none focus:border-2 focus:border-[#009FDF] font-inter">
                    </div>

                    <div class="flex space-x-3 pt-3">
                        <button type="button" onclick="toggleProfileModal(false)" class="flex-1 py-2.5 rounded-[50px] bg-gray-100 text-gray-600 font-bold border border-gray-200 text-center">
                            ยกเลิก
                        </button>
                        <button type="submit" class="flex-1 py-2.5 rounded-[50px] bg-[#009FDF] text-white font-bold text-center shadow-md">
                            บันทึกโปรไฟล์
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal: เพิ่มรายวิชาใหม่ -->
        <div id="add-modal" class="hidden absolute inset-0 bg-black/30 backdrop-blur-xs flex items-center justify-center p-4 z-50">
            <div class="w-full max-w-[370px] bg-[#F6F6F6] rounded-[30px] shadow-[12px_12px_24px_rgba(0,0,0,0.1),-12px_-12px_24px_rgba(255,255,255,0.9)] p-5 space-y-4 text-left border border-white">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-extrabold text-[#132045]">➕ เพิ่มรายวิชาใหม่</h3>
                    <button onclick="toggleModal(false)" class="p-1 rounded-full text-gray-400 hover:text-gray-600 font-bold text-xs">
                        ✖
                    </button>
                </div>

                <form id="add-subject-form" onsubmit="handleAddSubject(event)" class="space-y-3 text-xs">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="font-bold text-gray-500">ปีการศึกษา</label>
                            <select id="modal-year" class="w-full px-3 py-2 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none">
                                <option value="1">ปีการศึกษา 1</option>
                                <option value="2">ปีการศึกษา 2</option>
                                <option value="3">ปีการศึกษา 3</option>
                                <option value="4">ปีการศึกษา 4</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="font-bold text-gray-500">ภาคการศึกษา</label>
                            <select id="modal-semester" class="w-full px-3 py-2 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none">
                                <option value="1">เทอม 1</option>
                                <option value="2">เทอม 2</option>
                                <option value="3">เทอม 3</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="font-bold text-gray-500">รหัสวิชา (Subject Code)</label>
                        <input type="text" id="modal-code" required placeholder="เช่น DDT301" class="w-full px-4 py-2.5 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none focus:border-2 focus:border-[#009FDF] font-inter">
                    </div>

                    <div class="space-y-1">
                        <label class="font-bold text-gray-500">ชื่อวิชาภาษาไทย</label>
                        <input type="text" id="modal-nameTh" required placeholder="เช่น การออกแบบส่วนติดต่อผู้ใช้งาน" class="w-full px-4 py-2.5 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none focus:border-2 focus:border-[#009FDF]">
                    </div>

                    <div class="space-y-1">
                        <label class="font-bold text-gray-500">ชื่อวิชาภาษาอังกฤษ</label>
                        <input type="text" id="modal-nameEn" required placeholder="เช่น User Interface Design" class="w-full px-4 py-2.5 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none focus:border-2 focus:border-[#009FDF] font-inter">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="font-bold text-gray-500">จำนวนหน่วยกิต</label>
                            <select id="modal-credits" class="w-full px-3 py-2 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3" selected>3</option>
                                <option value="4">4</option>
                                <option value="6">6</option>
                                <option value="8">8</option>
                            </select>
                        </div>

                        <div class="space-y-1">
                            <label class="font-bold text-gray-500">เกรดที่ได้</label>
                            <select id="modal-grade" class="w-full px-3 py-2 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none">
                                <option value="">ยังไม่เรียน</option>
                                <option value="A">A</option>
                                <option value="B+">B+</option>
                                <option value="B">B</option>
                                <option value="C+">C+</option>
                                <option value="C">C</option>
                                <option value="D+">D+</option>
                                <option value="D">D</option>
                                <option value="F">F</option>
                                <option value="W">W</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="font-bold text-gray-500">หมวดหมู่หลักสูตร</label>
                        <select id="modal-category" onchange="handleModalCategoryChange()" class="w-full px-3 py-2.5 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none">
                            <option value="general">หมวดวิชาศึกษาทั่วไป (General Education)</option>
                            <option value="core">กลุ่มวิชาแกน (Core Courses)</option>
                            <option value="major_required">กลุ่มวิชาชีพบังคับ (Major Required)</option>
                            <option value="major_elective">กลุ่มวิชาชีพเลือก (Major Elective)</option>
                            <option value="free_elective">หมวดเลือกเสรี (Free Electives)</option>
                        </select>
                    </div>

                    <div id="modal-subCategory-container" class="space-y-1">
                        <label class="font-bold text-gray-500">กลุ่มวิชาย่อยศึกษาทั่วไป</label>
                        <select id="modal-subCategory" class="w-full px-3 py-2.5 rounded-[50px] neo-inset-sm text-gray-700 focus:outline-none">
                            <option value="1.1 ภาษาไทย">1.1 กลุ่มวิชาภาษาไทย (3 นก.)</option>
                            <option value="1.2 ภาษาต่างประเทศ">1.2 กลุ่มวิชาภาษาต่างประเทศ (6 นก.)</option>
                            <option value="1.3 วิทยาศาสตร์">1.3 กลุ่มวิชาวิทยาศาสตร์ (3 นก.)</option>
                            <option value="1.4 คณิตศาสตร์">1.4 กลุ่มวิชาคณิตศาสตร์ (3 นก.)</option>
                            <option value="1.5 สังคมศาสตร์">1.5 กลุ่มวิชาสังคมศาสตร์ (3 นก.)</option>
                            <option value="1.6 มนุษยศาสตร์">1.6 กลุ่มวิชามนุษยศาสตร์ (3 นก.)</option>
                            <option value="อื่น ๆ ในศึกษาทั่วไป" selected>อื่น ๆ ในกลุ่มวิชาเลือกทั่วไป</option>
                        </select>
                    </div>

                    <div class="flex items-center space-x-2 pt-2">
                        <input type="checkbox" id="modal-isRepeated" class="w-4 h-4 text-[#009FDF] focus:ring-0 rounded-[50px] bg-[#F6F6F6]">
                        <label for="modal-isRepeated" class="font-bold text-gray-500 cursor-pointer">
                            เคยลงทะเบียนวิชานี้ซ้ำเพื่อแก้เกรด / รีเกรด
                        </label>
                    </div>

                    <div class="flex space-x-3 pt-3">
                        <button type="button" onclick="toggleModal(false)" class="flex-1 py-2.5 rounded-[50px] bg-gray-100 text-gray-600 font-bold border border-gray-200 text-center">
                            ยกเลิก
                        </button>
                        <button type="submit" class="flex-1 py-2.5 rounded-[50px] bg-[#009FDF] text-white font-bold text-center shadow-md">
                            บันทึกวิชา
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Custom Confirm Modal -->
        <div id="confirm-modal" class="hidden absolute inset-0 bg-black/30 backdrop-blur-xs flex items-center justify-center p-4 z-55">
            <div class="w-full max-w-[340px] bg-[#F6F6F6] rounded-[30px] shadow-[12px_12px_24px_rgba(0,0,0,0.1),-12px_-12px_24px_rgba(255,255,255,0.9)] p-5 space-y-4 text-center border border-white">
                <div class="mx-auto w-12 h-12 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center neo-box-xs mb-1">
                    <i data-lucide="help-circle" class="w-6 h-6"></i>
                </div>
                <div class="space-y-1">
                    <h4 class="text-sm font-black text-[#132045]" id="confirm-title">ยืนยันการทำรายการ</h4>
                    <p class="text-[10px] text-gray-400 leading-normal" id="confirm-message">คุณต้องการยืนยันการทำรายการนี้ใช่หรือไม่?</p>
                </div>
                <div class="flex space-x-3 pt-2">
                    <button id="confirm-cancel-btn" class="flex-1 py-2.5 rounded-[50px] bg-gray-100 text-gray-600 font-bold border border-gray-200 text-center text-xs">
                        ยกเลิก
                    </button>
                    <button id="confirm-ok-btn" class="flex-1 py-2.5 rounded-[50px] bg-[#009FDF] text-white font-bold text-center text-xs shadow-md">
                        ตกลง
                    </button>
                </div>
            </div>
        </div>

        <!-- แถบเมนูด้านล่างสุด (คงที่และสัดส่วนพอดีเสมอ) -->
        <nav class="absolute bottom-0 inset-x-0 h-16 bg-[#F6F6F6] shadow-[0_-4px_12px_rgba(0,0,0,0.05)] flex justify-around items-center px-2 z-40 border-t border-gray-100 shrink-0">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center justify-center flex-1 py-1 transition text-[#009FDF] font-bold">
                <i data-lucide="book-marked" class="w-5 h-5 mb-0.5"></i>
                <span class="text-[9px]">หน้าแรก</span>
            </button>

            <button onclick="switchTab('subjects')" id="nav-subjects" class="flex flex-col items-center justify-center flex-1 py-1 transition text-gray-400">
                <i data-lucide="book-open" class="w-5 h-5 mb-0.5"></i>
                <span class="text-[9px]">วิชาเรียน</span>
            </button>

            <button onclick="switchTab('honor-check')" id="nav-honor-check" class="flex flex-col items-center justify-center flex-1 py-1 transition text-gray-400">
                <i data-lucide="award" class="w-5 h-5 mb-0.5"></i>
                <span class="text-[9px]">เกียรตินิยม</span>
            </button>

            <button onclick="switchTab('predict')" id="nav-predict" class="flex flex-col items-center justify-center flex-1 py-1 transition text-gray-400">
                <i data-lucide="sliders" class="w-5 h-5 mb-0.5"></i>
                <span class="text-[9px]">คาดการณ์</span>
            </button>
        </nav>

    </div>

    <!-- JavaScript logic -->
    <script>
        // ==========================================
        // 1. Initial Data & Setup
        // ==========================================
        const CATEGORIES = {
            general: { name: 'หมวดวิชาศึกษาทั่วไป (General Education)', requiredCredits: 33 },

            major_required: { name: 'กลุ่มวิชาชีพบังคับ (Major Required)', requiredCredits: 52 },
            major_elective: { name: 'กลุ่มวิชาชีพเลือก (Major Elective)', requiredCredits: 15 },
            free_elective: { name: 'หมวดเลือกเสรี (Free Electives)', requiredCredits: 6 }
        };

        const GRADE_VALUES = {
            'A': 4.0, 'B+': 3.5, 'B': 3.0, 'C+': 2.5, 'C': 2.0, 'D+': 1.5, 'D': 1.0, 'F': 0.0

        const INITIAL_SUBJECTS = [

            // ปี 1 เทอม 2

            { id: '13', code: 'DD102', nameTh: 'ทฤษฎีสีเพื่อการสื่อสารดิจิทัล', nameEn: 'Color Theory for Digital Communication', credits: 3, grade: 'B+', category: 'core', isRepeated: false, year: 1, semester: 2 },
            
            // ปี 1 เทอม 3

            { id: '6', code: 'GE106', nameTh: 'พลเมืองโลกและการพัฒนาที่ยั่งยืน', nameEn: 'Global Citizenship and Sustainable Development', credits: 3, grade: 'A', category: 'general', subCategory: '1.5 สังคมศาสตร์', isRepeated: false, year: 1, semester: 3 },
            { id: '14', code: 'DD103', nameTh: 'ประวัติศาสตร์การออกแบบและศิลปะร่วมสมัย', nameEn: 'History of Design and Contemporary Art', credits: 3, grade: 'A', category: 'core', isRepeated: false, year: 1, semester: 3 },

        // ==========================================
        // 2. Calculations Core Logic
        // ==========================================
        function runCalculations() {
            let totalGradePoints = 0;
            let gradedCredits = 0;
            let completedCredits = 0;

            const creditsByCategory = {
                general: 0,
                core: 0,
                major_required: 0,
                major_elective: 0,
                free_elective: 0
            };

            // โครงสร้างสำหรับคำนวณเกรดรายปีและรายเทอม
            const yearSemesterStats = {};
            for (let y = 1; y <= 4; y++) {
                yearSemesterStats[y] = {
                    totalPoints: 0,
                    gradedCredits: 0,
                    completedCredits: 0,
                    semesters: {
                        1: { totalPoints: 0, gradedCredits: 0, completedCredits: 0 },
                        2: { totalPoints: 0, gradedCredits: 0, completedCredits: 0 },
                        3: { totalPoints: 0, gradedCredits: 0, completedCredits: 0 }
                    }
                };
            }

            subjects.forEach(subject => {
                const { credits, grade, category, year, semester } = subject;
                
                // ตรวจสอบค่าปีและเทอมให้อยู่ในระบบ 1-4 และ 1-3
                const sYear = (year >= 1 && year <= 4) ? year : 1;
                const sSem = (semester >= 1 && semester <= 3) ? semester : 1;

                if (grade !== '' && grade !== 'W') {
                    const gradeValue = GRADE_VALUES[grade];
                    const points = gradeValue * credits;

                    // สรุปรวมสะสมของระบบหลักสูตร
                    if (grade !== 'F') {
                        completedCredits += credits;
                        creditsByCategory[category] += credits;
                        
                        // สรุประดับรายปี/รายเทอมที่ผ่าน
                        yearSemesterStats[sYear].completedCredits += credits;
                        yearSemesterStats[sYear].semesters[sSem].completedCredits += credits;
                    }
                    totalGradePoints += points;
                    gradedCredits += credits;

                    // สรุปเกรดเฉลี่ยรายปีและรายเทอม
                    yearSemesterStats[sYear].totalPoints += points;
                    yearSemesterStats[sYear].gradedCredits += credits;

                    yearSemesterStats[sYear].semesters[sSem].totalPoints += points;
                    yearSemesterStats[sYear].semesters[sSem].gradedCredits += credits;
                }
            });

            const gpax = gradedCredits > 0 ? totalGradePoints / gradedCredits : 0;
            const hasF = subjects.some(s => s.grade === 'F');
            const hasRepeated = subjects.some(s => s.isRepeated);

            let honorStatus = 'none';
            let honorReason = [];

            if (gpax >= 3.75) {
                honorStatus = '1st';
            } else if (gpax >= 3.25) {
                honorStatus = '2nd';
            }

            if (honorStatus !== 'none') {
                if (hasF) {
                    honorStatus = 'none';
                    honorReason.push('มีผลการเรียนติดเกรด F ในประวัติ');
                }
                if (durationYears > 4) {
                    honorStatus = 'none';
                    honorReason.push('ระยะเวลาศึกษาเกินกว่า 4 ปีหลักสูตร');
                }
                if (hasRepeated) {
                    honorStatus = 'none';
                    honorReason.push('เคยลงทะเบียนเรียนซ้ำวิชาเดิมเพื่อปรับเกรด');
                }
            }

            // คำนวณเกรดเฉลี่ยในแต่ละปีและเทอม
            const yearGPAs = {};
            for (let y = 1; y <= 4; y++) {
                const yrData = yearSemesterStats[y];
                yearGPAs[y] = {
                    gpa: yrData.gradedCredits > 0 ? yrData.totalPoints / yrData.gradedCredits : 0,
                    gradedCredits: yrData.gradedCredits,
                    completedCredits: yrData.completedCredits,
                    semesters: {}
                };
                for (let s = 1; s <= 3; s++) {
                    const semData = yrData.semesters[s];
                    yearGPAs[y].semesters[s] = {
                        gpa: semData.gradedCredits > 0 ? semData.totalPoints / semData.gradedCredits : 0,
                        gradedCredits: semData.gradedCredits,
                        completedCredits: semData.completedCredits
                    };
                }
            }

            // --- ส่วนประเมินสถานภาพนักศึกษาตามเกณฑ์ ม.วลัยลักษณ์ (WU Academic Standing System) ---
            let academicStanding = 'normal'; // normal (ปกติ), probation (รอพินิจ), dismissed (พ้นสภาพ)
            let probationThreshold = 1.95;
            let standingExplanation = '';
            
            // ประเมินสภาพอ้างอิงตามจำนวนหน่วยวิชาสอบได้สะสม (Completed Credits)
            if (completedCredits <= 14) {
                probationThreshold = 1.55;
            } else if (completedCredits <= 28) {
                probationThreshold = 1.65;
            } else if (completedCredits <= 42) {
                probationThreshold = 1.75;
            } else if (completedCredits <= 56) {
                probationThreshold = 1.85;
            } else {
                probationThreshold = 1.95;
            }

            // ตรวจประเมินผลการเรียนหลักสูตร
            if (gradedCredits > 0) {
                if (gpax < 1.00) {
                    academicStanding = 'dismissed';
                    standingExplanation = 'พ้นสภาพ เนื่องจากมีแต้มเฉลี่ยสะสมสะสมต่ำกว่า 1.00';
                } else if (gpax < probationThreshold) {
                    if (mockProbationCount >= 2) { 
                        academicStanding = 'dismissed';
                        standingExplanation = `พ้นสภาพ เนื่องจากเกรดปัจจุบันต่ำกว่าเกณฑ์ควบคุม (${probationThreshold}) และติดสถานภาพรอพินิจสะสมติดต่อกันครบ 3 ภาคการศึกษา`;
                    } else {
                        academicStanding = 'probation';
                        standingExplanation = `สภาพรอพินิจ เนื่องจากหน่วยกิตสะสมคือ ${completedCredits} นก. และเกรดต่ำกว่าเกณฑ์ควบคุมปกติ (< ${probationThreshold})`;
                    }
                } else {
                    academicStanding = 'normal';
                    if (mockProbationCount > 0) {
                        standingExplanation = `สถานภาพปกติ (ได้รับการละเว้นพ้นสภาพพินิจ เนื่องจากเกรดเฉลี่ยปัจจุบัน ${gpax.toFixed(2)} ปลอดภัยและสูงกว่าเกณฑ์ควบคุมขั้นต่ำ ${probationThreshold})`;
                    } else {
                        standingExplanation = 'สถานภาพปกติ ตามเงื่อนไขควบคุมคะแนนสะสม ม.วลัยลักษณ์';
                    }
                }
            } else {
                standingExplanation = 'ยังไม่มีวิชาที่ได้รับผลประเมินเกรด';
            }

            // --- ส่วนวิเคราะห์แนวโน้มการศึกษาอัจฉริยะ (Academic Trend Radar) ---
            let academicTrend = {
                label: 'ปกติ / ทรงตัว',
                color: 'text-blue-500 bg-blue-50 border border-blue-200',
                textColor: 'text-blue-600',
                icon: 'trending-up', // จะเรนเดอร์ไอคอนผ่าน Lucide ด้วย
                desc: 'ผลการเรียนของคุณอยู่ในระดับปกติและมีความมั่นคงดี รักษามาตรฐานการทำคะแนนสะสมแบบนี้ต่อไป',
                type: 'stable'
            };

            // ดึงผลการเรียนรายเทอมที่บันทึกไว้แล้วเรียงตามลำดับเวลา เพื่อประเมินเชิงสถิติ (Slope)
            let activeSemesters = [];
            for (let y = 1; y <= 4; y++) {
                for (let s = 1; s <= 3; s++) {
                    const semData = yearSemesterStats[y].semesters[s];
                    if (semData.gradedCredits > 0) {
                        activeSemesters.push({
                            year: y,
                            semester: s,
                            gpa: semData.totalPoints / semData.gradedCredits
                        });
                    }
                }
            }

            if (gradedCredits > 0) {
                if (gpax >= 3.25) {
                    // กลุ่มผลการเรียนดีเยี่ยมและสม่ำเสมอ
                    academicTrend = {
                        label: 'ดีเยี่ยม / มีความเสถียรสูง',
                        color: 'bg-emerald-50 border border-emerald-200',
                        textColor: 'text-emerald-600',
                        icon: 'trending-up',
                        desc: 'คะแนนเฉลี่ยสะสมรวมอยู่ในเกณฑ์สูง ยอดเยี่ยมมาก! คุณรักษาระเบียบการศึกษาได้อย่างสมบูรณ์แบบ',
                        type: 'good'
                    };
                } else if (gpax < 2.00) {
                    // กลุ่มเสี่ยงติดพินิจหรือวิกฤต
                    academicTrend = {
                        label: 'ควรปรับปรุงเร่งด่วน',
                        color: 'bg-rose-50 border border-rose-200',
                        textColor: 'text-rose-600',
                        icon: 'trending-down',
                        desc: 'ผลการเรียนสะสมปัจจุบันเฉลี่ยต่ำกว่าเกณฑ์ความปลอดภัย ควรพิจารณาวางแผนรีเกรดหรือเรียนจำลองเพิ่มด่วน',
                        type: 'needs_improvement'
                    };
                } else if (activeSemesters.length >= 2) {
                    // ตรวจสอบโมเมนตัมแนวโน้มระหว่างเทอม (เปรียบเทียบเทอมล่าสุดกับสถิติตลอดเวลาก่อนหน้า)
                    const latestSem = activeSemesters[activeSemesters.length - 1];
                    let sumPrevPoints = 0;
                    let sumPrevCredits = 0;

                    // คำนวณ GPAX ก่อนเทอมล่าสุด
                    subjects.forEach(subject => {
                        const { year, semester, grade, credits } = subject;
                        if (grade !== '' && grade !== 'W') {
                            // เช็คว่าไม่ได้อยู่ในเทอมล่าสุด
                            if (!(year === latestSem.year && semester === latestSem.semester)) {
                                sumPrevPoints += (GRADE_VALUES[grade] * credits);
                                sumPrevCredits += credits;
                            }
                        }
                    });

                    const prevGpax = sumPrevCredits > 0 ? sumPrevPoints / sumPrevCredits : gpax;
                    const delta = latestSem.gpa - prevGpax;

                    if (delta > 0.2) {
                        academicTrend = {
                            label: 'ดีขึ้นอย่างโดดเด่น (ขาขึ้น)',
                            color: 'bg-cyan-50 border border-cyan-200',
                            textColor: 'text-cyan-600',
                            icon: 'trending-up',
                            desc: `ผลการเรียนในเทอมล่าสุด (${latestSem.gpa.toFixed(2)}) ปรับตัวสูงขึ้นกว่าค่าเฉลี่ยเดิมอย่างมีนัยสำคัญ แนวโน้มการเรียนอยู่ในสภาวะพัฒนาขึ้น!`,
                            type: 'good'
                        };
                    } else if (delta < -0.4) {

                            type: 'needs_improvement'
                        };
                    }
                }
            }

            return {
                gpax,
                gradedCredits,
                completedCredits,
                creditsByCategory,
                hasF,
                hasRepeated,
                honorStatus,
                honorReason,
                yearGPAs,
                academicStanding,
                probationThreshold,
                standingExplanation,
                academicTrend
            };
        }

        function runSimulationCalculations() {
            let totalGradePoints = 0;
            let gradedCredits = 0;
            let completedCredits = 0;

            subjects.forEach(subject => {
                const { id, credits, grade } = subject;
                // ถ้าวิชานี้มีเกรดจริงที่บันทึกไว้แล้ว ให้นำเกรดจริงมาคิด
                if (grade !== '' && grade !== 'W') {
                    if (grade !== 'F') completedCredits += credits;
                    totalGradePoints += (GRADE_VALUES[grade] * credits);
                    gradedCredits += credits;
                } else if (grade === '') {
                    // หากยังไม่มีเกรดจริง ให้ตรวจเช็คผลการเรียนจำลองรายวิชา
                    const simGrade = simulatedGrades[id];
                    if (simGrade && simGrade !== '' && simGrade !== 'W') {
                        if (simGrade !== 'F') completedCredits += credits;
                        totalGradePoints += (GRADE_VALUES[simGrade] * credits);
                        gradedCredits += credits;
                    }
                }
            });

            const predictedGpax = gradedCredits > 0 ? totalGradePoints / gradedCredits : 0;
            return {
                predictedGpax,
                gradedCredits,
                completedCredits
            };
        }

            if (typeof lucide !== 'undefined') {
                try {
                    lucide.createIcons();
                } catch (e) {
                    console.error('Error rendering lucide icons:', e);
                }
            }
        }

        // ==========================================
        // 4. Interaction & Tab Controllers
        // ==========================================
        function switchTab(tabId) {
            activeTab = tabId;
            
            const tabs = ['dashboard', 'subjects', 'honor-check', 'predict'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (t === tabId) {
                    btn.className = "flex flex-col items-center justify-center flex-1 py-1 transition text-[#009FDF] font-bold scale-105";
                } else {
                    btn.className = "flex flex-col items-center justify-center flex-1 py-1 transition text-gray-400";
                }
            });

            render();
        }

        function setDashboardSubTab(subTab) {
            dashboardSubTab = subTab;
            render();
        }

        function setFilterCategory(cat) {
            filterCategory = cat;
            render();
        }

        function setFilterYear(yr) {
            filterYear = yr;
            render();
        }

        function handleSearch(val) {
            searchQuery = val;
            render();
        }

        function changeDuration(step) {
            durationYears = Math.max(1, Math.min(8, durationYears + step));
            render();
        }

        function setTargetGrade(grade) {
            targetGrade = grade;
            render();
        }

        // กำหนดเกรดจำลองให้ทุกวิชาที่เหลือพร้อมกันในคราวเดียว
        function setAllSimulatedGrades(grade) {
            targetGrade = grade;
            const pending = subjects.filter(s => s.grade === '');
            pending.forEach(s => {
                simulatedGrades[s.id] = grade;
            });
            render();
        }

        // อัปเดตเกรดจำลองรายวิชา
        function updateSimulatedGrade(id, grade) {
            simulatedGrades[id] = grade;
            targetGrade = ''; // รีเซ็ตสถานะปุ่มความเร็วหลัก
            render();
        }

        // ==========================================
        // Custom Dialog Confirmation Handlers
        // ==========================================
        let confirmCallback = null;
        function customConfirm(title, message, callback) {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-message').innerText = message;
            document.getElementById('confirm-modal').classList.remove('hidden');
            confirmCallback = callback;
        }

        document.getElementById('confirm-cancel-btn').onclick = function() {
            document.getElementById('confirm-modal').classList.add('hidden');
            confirmCallback = null;
        };

        document.getElementById('confirm-ok-btn').onclick = function() {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (confirmCallback) confirmCallback();
            confirmCallback = null;
        };

        // ==========================================
        // 5. Operations (CRUD Subjects)
        // ==========================================
        function updateGrade(id, newGrade) {
            subjects = subjects.map(s => s.id === id ? { ...s, grade: newGrade } : s);
            saveToStorage();
            render();
        }

        // สลับสถานะเคยลงทะเบียนซ้ำ
        function toggleRepeated(id) {
            subjects = subjects.map(s => s.id === id ? { ...s, isRepeated: !s.isRepeated } : s);
            saveToStorage();
            render();
        }

        function deleteSubject(id) {
            customConfirm('ยืนยันการลบวิชาเรียน', 'ต้องการลบวิชาเรียนนี้ออกจากแผนการศึกษาปัจจุบันใช่หรือไม่?', () => {
                subjects = subjects.filter(s => s.id !== id);
                saveToStorage();
                render();
            });
        }

        function resetData() {
            customConfirm('ยืนยันการรีเซ็ตระบบ', 'ต้องการลบข้อมูลวิชาเรียนทั้งหมด และประวัติการแก้ไข เพื่อย้อนกลับสู่ค่าเริ่มต้นหลักสูตร 133 หน่วยกิตหรือไม่?', () => {
                subjects = INITIAL_SUBJECTS;
                durationYears = 4;
                simulatedGrades = {};
                mockProbationCount = 0;
                userProfile = {
                    name: 'ณัฐพล รักษ์ดิจิทัล',
                    studentId: '66101234',
                    photo: 'https://placehold.co/150/E2F8FF/009FDF?text=DDT'
                };
                localStorage.setItem('ddt_user_profile', JSON.stringify(userProfile));
                saveToStorage();
                render();
            });
        }

        // ==========================================
        // 6. User Profile File Upload & Logic
        // ==========================================
        function handleFileSelected(event) {
            const file = event.target.files[0];
            const statusSpan = document.getElementById('file-upload-status');
            
            if (file) {
                // อัปเดตชื่อไฟล์บอกสถานะ
                statusSpan.innerText = file.name;
                
                // ตรวจเช็คขนาดไฟล์ให้อยู่ในสัดส่วนปลอดภัย (ไม่ควรเกิน 1.5MB เพื่อไม่ให้เกินความจุของ LocalStorage)
                if (file.size > 1.5 * 1024 * 1024) {
                    customConfirm('ไฟล์มีขนาดใหญ่เกินกำหนด', 'ขอแนะนำให้เลือกใช้รูปภาพขนาดไม่เกิน 1.5MB เพื่อคุณภาพในการบันทึกข้อมูล ยืนยันการอัปโหลดต่อไปหรือไม่?', () => {
                        processImageFile(file);
                    });
                } else {
                    processImageFile(file);
                }
            } else {
                statusSpan.innerText = 'ไม่ได้เลือกไฟล์';
            }
        }

        // แปลงไฟล์ภาพเป็น Base64
        function processImageFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                tempBase64Photo = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ส่วนของ Modal โปรไฟล์ผู้ใช้
        function toggleProfileModal(show) {
            const modal = document.getElementById('profile-modal');
            if (show) {
                modal.classList.remove('hidden');
                document.getElementById('profile-name-input').value = userProfile.name;
                document.getElementById('profile-id-input').value = userProfile.studentId;
                
                // หากใช้รูปจำลอง placeholder ให้ปล่อยช่องกรอก URL ว่างไว้เพื่อความปลอดภัย
                document.getElementById('profile-photo-input').value = userProfile.photo.includes('placehold.co') ? '' : userProfile.photo;
                document.getElementById('file-upload-status').innerText = 'ไม่ได้เลือกไฟล์';
                tempBase64Photo = ''; // ล้างค่าชั่วคราวสะสม
            } else {
                modal.classList.add('hidden');
            }
        }

        function handleSaveProfile(e) {
            e.preventDefault();
            const name = document.getElementById('profile-name-input').value.trim();
            const studentId = document.getElementById('profile-id-input').value.trim();
            let photo = document.getElementById('profile-photo-input').value.trim();
            
            // ตรวจสอบว่าผู้ใช้ทำการอัปโหลดรูปภาพผ่านเครื่องหรือไม่ หากมีจะใช้รูป Base64 จากเครื่องเป็นหลัก
            if (tempBase64Photo) {
                photo = tempBase64Photo;
            } else if (!photo) {
                // หากผู้ใช้ไม่ได้ระบุลิงก์รูปถ่ายส่วนตัว และไม่ได้อัปโหลดไฟล์ ระบบจะสร้างอวตาร์อักษรย่อให้สวยงาม
                const initials = encodeURIComponent(name.substring(0, 3));
                photo = `https://placehold.co/150/E2F8FF/009FDF?text=${initials}`;
            }

            userProfile = { name, studentId, photo };
            localStorage.setItem('ddt_user_profile', JSON.stringify(userProfile));
            toggleProfileModal(false);
            render();
        }

        // ส่วนของ Modal
        function toggleModal(show) {
            const modal = document.getElementById('add-modal');
            if (show) {
                modal.classList.remove('hidden');
                handleModalCategoryChange(); 
            } else {
                modal.classList.add('hidden');
            }
        }

        function handleModalCategoryChange() {
            const cat = document.getElementById('modal-category').value;
            const container = document.getElementById('modal-subCategory-container');
            if (cat === 'general') {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function handleAddSubject(e) {
            e.preventDefault();
            const year = parseInt(document.getElementById('modal-year').value);
            const semester = parseInt(document.getElementById('modal-semester').value);
            const code = document.getElementById('modal-code').value.toUpperCase().trim();
            const nameTh = document.getElementById('modal-nameTh').value.trim();
            const nameEn = document.getElementById('modal-nameEn').value.trim();
            const credits = Number(document.getElementById('modal-credits').value);
            const grade = document.getElementById('modal-grade').value;
            const category = document.getElementById('modal-category').value;
            const subCategory = document.getElementById('modal-subCategory').value;
            const isRepeated = document.getElementById('modal-isRepeated').checked;

            const newSubject = {
                id: Date.now().toString(),
                code,
                nameTh,
                nameEn,
                credits,
                grade,
                category,
                subCategory: category === 'general' ? subCategory : undefined,
                isRepeated,
                year,
                semester
            };

            subjects.push(newSubject);
            saveToStorage();
            toggleModal(false);
            
            // รีเซ็ตแบบฟอร์ม
            document.getElementById('add-subject-form').reset();
            
            render();
        }

        // โหลดครั้งแรกเมื่อเบราว์เซอร์พร้อมทำงาน
        window.onload = function() {
            render();
            // เรียกซ้ำอีกครั้งหลังจากหน้าโหลด เผื่อมีกรณีที่ Lucide โหลดเสร็จทีหลัง
            setTimeout(function() {
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            }, 100);
        }
    </script>
</body>
</html>
