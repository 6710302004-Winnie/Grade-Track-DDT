        // 2. Calculations Core Logic
        // ==========================================
        function runCalculations() {
            let totalGradePoints = 0;
            let gradedCredits = 0;
            let completedCredits = 0;

            const creditsByCategory = {
                general: 0,
                core: 0,
                major_required: 0,
                major_elective: 0,
                free_elective: 0
            };

            subjects.forEach(subject => {
                const { credits, grade, category } = subject;
                if (grade !== '' && grade !== 'W') {
                    if (grade !== 'F') {
                        completedCredits += credits;
                        creditsByCategory[category] += credits;
                    }
                    const gradeValue = GRADE_VALUES[grade];
                    totalGradePoints += (gradeValue * credits);
                    gradedCredits += credits;
                }
            });

            const gpax = gradedCredits > 0 ? totalGradePoints / gradedCredits : 0;
            const hasF = subjects.some(s => s.grade === 'F');
            const hasRepeated = subjects.some(s => s.isRepeated);

            let honorStatus = 'none';
            let honorReason = [];

            if (gpax >= 3.75) {
                honorStatus = '1st';
            } else if (gpax >= 3.25) {
                honorStatus = '2nd';
            }

            if (honorStatus !== 'none') {
                if (hasF) {
                    honorStatus = 'none';
                    honorReason.push('มีผลการเรียนติดเกรด F ในประวัติ');
                }
                if (durationYears > 4) {
                    honorStatus = 'none';
                    honorReason.push('ระยะเวลาศึกษาเกินกว่า 4 ปีหลักสูตร');
                }
                if (hasRepeated) {

                    honorReason.push('เคยลงทะเบียนเรียนซ้ำวิชาเดิมเพื่อปรับเกรด');
                }
            }

            return {
                gpax,
                gradedCredits,
                completedCredits,
                creditsByCategory,
                hasF,
                hasRepeated,
                honorStatus,
                honorReason
            };
        }

                                            <span class="text-xs font-extrabold text-indigo-600 font-inter">${durationYears} ปี</span>
                                            <button onclick="changeDuration(1)" class="px-2 py-0.5 text-xs neo-box-xs rounded font-black text-gray-600">+</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- กล่องผลสรุปเกียรตินิยม -->
                        <div class="p-4 rounded-2xl ${
                            cal.honorStatus === '1st' ? 'bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-300 text-amber-900' :
                            cal.honorStatus === '2nd' ? 'bg-gradient-to-br from-blue-50 to-blue-100 border border-blue-300 text-blue-900' :
                            'bg-gradient-to-br from-gray-50 to-gray-100 border border-gray-300 text-gray-800'
                        } space-y-1.5">
                            <h4 class="text-xs font-extrabold uppercase tracking-widest flex items-center">
                                <i data-lucide="graduation-cap" class="w-4 h-4 mr-1 text-amber-600"></i>
                                ผลการวิเคราะห์สิทธิ์อย่างเป็นทางการ
                            </h4>
                            <p class="text-sm font-extrabold leading-normal">
                                ${cal.honorStatus === '1st' ? '🎉 ยินดีด้วยอย่างยิ่ง! คุณมีคุณสมบัติครบถ้วนสำหรับ "เกียรตินิยมอันดับ 1"' : ''}
                                ${cal.honorStatus === '2nd' ? '👏 เก่งมาก! คุณมีคุณสมบัติครบถ้วนสำหรับ "เกียรตินิยมอันดับ 2"' : ''}
                                ${cal.honorStatus === 'none' ? '🤝 คุณมีสิทธิ์สำเร็จการศึกษาในระดับระดับหลักสูตรปกติ' : ''}
                            </p>
                            ${cal.honorStatus === 'none' && cal.honorReason.length > 0 ? `
                                <div class="text-[10px] text-rose-600 mt-2">
                                    <span class="font-extrabold block mb-0.5">เหตุผลที่ตัดสิทธิ์เกียรตินิยม:</span>
                                    <ul class="list-disc pl-4 space-y-0.5">
                                        ${cal.honorReason.map(r => `<li>${r}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }

            else if (activeTab === 'predict') {
                const pending = subjects.filter(s => s.grade === '');
                const pendingCredits = pending.reduce((acc, s) => acc + s.credits, 0);

                // คาดการณ์เกรดเฉลี่ย
                let totalGradePoints = 0;
                let gradedCredits = 0;

                subjects.forEach(s => {
                    if (s.grade !== '' && s.grade !== 'W') {
                        totalGradePoints += (GRADE_VALUES[s.grade] * s.credits);
                        gradedCredits += s.credits;
                    }
                });

                if (targetGrade !== '') {
                    pending.forEach(s => {
                        totalGradePoints += (GRADE_VALUES[targetGrade] * s.credits);
                        gradedCredits += s.credits;
                    });
                }

                const predictedGpax = gradedCredits > 0 ? totalGradePoints / gradedCredits : 0;

                container.innerHTML = `
                    <div class="space-y-4 animate-fade-in">
                        <div class="p-4 rounded-2xl neo-box space-y-3">
                            <div class="flex items-center space-x-2">
                                <i data-lucide="sliders" class="w-5 h-5 text-indigo-500"></i>
                                <h3 class="text-sm font-extrabold text-gray-700">จำลองคะแนนและเกรดสะสม</h3>
                            </div>
                            <p class="text-xs text-gray-500 leading-normal">
                                จำลองเกรดสำหรับรายวิชาที่เหลือ เพื่อตรวจสอบระดับผลสัมฤทธิ์ปลายทางก่อนจบปี 4
                            </p>
                        </div>

                        <div class="p-4 rounded-2xl neo-box space-y-3">
                            <h4 class="text-xs font-bold text-gray-700">📌 ข้อมูลวิชาที่เหลือในโครงสร้างหลักสูตร:</h4>
                            <div class="grid grid-cols-2 gap-3 text-center">
                                <div class="p-2.5 rounded-xl neo-inset">
                                    <span class="text-[10px] text-gray-500 block">วิชาที่ยังไม่ประเมิน</span>
                                    <span class="text-lg font-bold text-indigo-600 font-inter">${pending.length} วิชา</span>
                                </div>
                                <div class="p-2.5 rounded-xl neo-inset">
                                    <span class="text-[10px] text-gray-500 block">จำนวนหน่วยกิตคงเหลือ</span>
                                    <span class="text-lg font-bold text-indigo-600 font-inter">${pendingCredits} นก.</span>
                                </div>
                            </div>
                        </div>

                        ${pending.length === 0 ? `
                            <div class="p-4 rounded-xl bg-emerald-50 text-emerald-800 text-xs text-center font-bold">
                                🎉 ยอดเยี่ยม! คุณประเมินผลการเรียนครบทุกหน่วยกิตในหลักสูตร 133 นก. แล้ว
                            </div>
                        ` : `
                            <div class="p-4 rounded-2xl neo-box space-y-4">
                                <div class="space-y-1.5">
                                    <label class="text-xs font-bold text-gray-600 block">
                                        หากวิชาที่เหลือทั้งหมด (${pending.length} วิชา) ได้รับเกรดสะสมเฉลี่ย:
                                    </label>
                                    
                                    <div class="flex space-x-2">
                                        ${['A', 'B+', 'B', 'C+', 'C'].map(g => `
                                            <button onclick="setTargetGrade('${g}')" class="flex-1 py-2 text-xs font-bold rounded-lg transition ${targetGrade === g ? 'bg-indigo-600 text-white shadow-md' : 'neo-box-xs text-gray-600 font-inter'}">
                                                ${g}
                                            </button>
                                        `).join('')}
                                    </div>
                                </div>

                                <div class="p-3.5 rounded-xl bg-indigo-50 border border-indigo-100 text-center space-y-1">
                                    <span class="text-[10px] uppercase tracking-wider text-indigo-600 font-bold">เกรดเฉลี่ยเป้าหมายคาดเดาปลายทาง</span>
                                    <h3 class="text-3xl font-extrabold text-indigo-800 font-inter">${predictedGpax.toFixed(2)}</h3>
                                    <p class="text-[10px] text-gray-500">วิเคราะห์บนผลสะสมรวม ${gradedCredits} หน่วยกิต</p>
                                </div>

                                <div class="text-[11px] text-gray-500 leading-normal flex items-start space-x-1">
                                    <i data-lucide="info" class="w-3.5 h-3.5 text-indigo-500 flex-shrink-0 mt-0.5"></i>
                                    <span>สูตรนี้ประมวลผลโดยการแทนค่าเกรดเฉลี่ยเป้าหมายที่คุณระบุลงในทุกกลุ่มวิชาที่คงเหลือทั้งหมด</span>
                                </div>
                            </div>
                        `}
                    </div>
                `;
            }

            // โหลดไอคอนใหม่เพื่อให้ Lucide ทำงานได้ถูกต้องหลังเรนเดอร์ใหม่
            lucide.createIcons();
        }

        // ==========================================
        // 4. Interaction & Tab Controllers
        // ==========================================
        function switchTab(tabId) {
            activeTab = tabId;
            
            // อัปเดต CSS สถานะปุ่มเมนู
            const tabs = ['dashboard', 'subjects', 'honor-check', 'predict'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (t === tabId) {
                    btn.className = "flex flex-col items-center justify-center flex-1 py-1 transition text-indigo-600 scale-105 font-bold";
                } else {
                    btn.className = "flex flex-col items-center justify-center flex-1 py-1 transition text-gray-500";
                }
            });

            render();
        }

        function setFilterCategory(cat) {
            filterCategory = cat;
            render();
        }

        function handleSearch(val) {
            searchQuery = val;
            render();
        }

        function changeDuration(step) {
            durationYears = Math.max(1, Math.min(8, durationYears + step));
            render();
        }

        function setTargetGrade(grade) {
            targetGrade = grade;
            render();
        }

        // ==========================================
        // 5. Operations (CRUD Subjects)
        // ==========================================
        function updateGrade(id, newGrade) {
            subjects = subjects.map(s => s.id === id ? { ...s, grade: newGrade } : s);
            saveToStorage();
            render();
        }

        function toggleRepeated(id) {
            subjects = subjects.map(s => s.id === id ? { ...s, isRepeated: !s.isRepeated } : s);
            saveToStorage();
            render();
        }

        function deleteSubject(id) {
            if(confirm('ต้องการลบวิชาเรียนนี้ใช่หรือไม่?')) {
                subjects = subjects.filter(s => s.id !== id);
                saveToStorage();
                render();
            }
        }

        function resetData() {
            if (confirm('คุณต้องการรีเซ็ตวิชาเรียนทั้งหมดกลับสู่การตั้งค่ามาตรฐานใช่หรือไม่?')) {
                subjects = INITIAL_SUBJECTS;
                durationYears = 4;
                saveToStorage();
                render();
            }
        }

        // ส่วนของ Modal
        function toggleModal(show) {
            const modal = document.getElementById('add-modal');
            if (show) {
                modal.classList.remove('hidden');
                handleModalCategoryChange(); // ตรวจเช็คเพื่อปรับแต่งการซ่อนกลุ่มย่อย
            } else {
                modal.classList.add('hidden');
            }
        }

        function handleModalCategoryChange() {
            const cat = document.getElementById('modal-category').value;
            const container = document.getElementById('modal-subCategory-container');
            if (cat === 'general') {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function handleAddSubject(e) {
            e.preventDefault();
            const code = document.getElementById('modal-code').value.toUpperCase().trim();
            const nameTh = document.getElementById('modal-nameTh').value.trim();
            const nameEn = document.getElementById('modal-nameEn').value.trim();
            const credits = Number(document.getElementById('modal-credits').value);
            const grade = document.getElementById('modal-grade').value;
            const category = document.getElementById('modal-category').value;
            const subCategory = document.getElementById('modal-subCategory').value;
            const isRepeated = document.getElementById('modal-isRepeated').checked;

            const newSubject = {
                id: Date.now().toString(),
                code,
                nameTh,
                nameEn,
                credits,
                grade,
                category,
                subCategory: category === 'general' ? subCategory : undefined,
                isRepeated
            };

            subjects.push(newSubject);
            saveToStorage();
            toggleModal(false);
            
            // รีเซ็ตแบบฟอร์ม
            document.getElementById('add-subject-form').reset();
            
            render();
        }

        // โหลดครั้งแรก
        window.onload = function() {
            render();
        }
    </script>
</body>
</html>
